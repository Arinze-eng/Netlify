name: cdn_chatroom
description: A premium offline chatting app with in-app VPN, Supabase serverless, and Firebase push notifications.
version: 3.3.0+18

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Supabase — used as serverless transport/signaling ONLY (no persistent data storage)
  supabase_flutter: ^2.6.0

  # Firebase — push notifications (FCM) + real-time background delivery
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0

  # WebRTC for calls
  flutter_webrtc: ^0.12.0

  # V2Ray/Xray core plugin (preferred)
  flutter_v2ray: ^1.0.10

  intl: ^0.19.0
  uuid: ^4.4.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  record: ^6.0.0
  path_provider: ^2.1.4
  audioplayers: ^5.2.1
  just_audio: ^0.9.40
  path: ^1.9.0
  http: ^1.2.2
  permission_handler: ^11.3.1
  file_saver: ^0.2.14
  flutter_local_notifications: ^17.1.2

  # Google Drive backup/restore
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  googleapis_auth: ^1.6.0
  archive: ^3.4.10

  # Local DB (WhatsApp-like offline messages — PRIMARY storage)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Background polling (fallback for notifications)
  workmanager: ^0.9.0
  connectivity_plus: ^6.0.5

  # File attachments
  file_picker: ^8.0.3
  open_filex: ^4.6.0

  # Color picker for image editor (WhatsApp-style HSL wheel)
  flutter_colorpicker: ^1.1.0

  # Share files, images, voice notes externally
  share_plus: ^12.0.2

  # Video player for one-time videos and status
  video_player: ^2.9.1

  # Background service for persistent notifications
  flutter_background_service: ^5.0.7

dependency_overrides:
  isar_flutter_libs:
    path: third_party/isar_flutter_libs
  device_apps:
    path: third_party/device_apps
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  url_launcher: ^6.2.5
  cached_network_image: ^3.3.1
  flutter_blurhash: ^0.8.2
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/chat_bg.jpg
